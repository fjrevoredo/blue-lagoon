[app]
name = "blue-lagoon"
log_filter = "info"

[database]
minimum_supported_schema_version = 1

[harness]
allow_synthetic_smoke = true
default_foreground_iteration_budget = 1
default_wall_clock_budget_ms = 60000
default_foreground_token_budget = 4000

[scheduled_foreground]
enabled = true
max_due_tasks_per_iteration = 2
min_cadence_seconds = 300
default_cooldown_seconds = 300

[background.scheduler]
poll_interval_seconds = 300
max_due_jobs_per_iteration = 4
lease_timeout_ms = 300000

[background.thresholds]
episode_backlog_threshold = 25
candidate_memory_threshold = 10
contradiction_alert_threshold = 3

[background.execution]
default_iteration_budget = 2
default_wall_clock_budget_ms = 120000
default_token_budget = 6000

[background.wake_signals]
allow_foreground_conversion = true
max_pending_signals = 8
cooldown_seconds = 900

[continuity.retrieval]
max_recent_episode_candidates = 3
max_memory_artifact_candidates = 5
max_context_items = 6

[continuity.backlog_recovery]
pending_message_count_threshold = 3
pending_message_span_seconds_threshold = 120
stale_pending_ingress_age_seconds_threshold = 300
max_recovery_batch_size = 8

[workspace]
root_dir = "."
max_artifact_bytes = 1048576
max_script_bytes = 262144

[observability]
model_call_payload_retention_days = 30

[approvals]
default_ttl_seconds = 900
max_pending_requests = 32
allow_cli_resolution = true
prompt_mode = "inline_keyboard_with_fallback"

[governed_actions]
approval_required_min_risk_tier = "tier_2"
default_subprocess_timeout_ms = 30000
max_subprocess_timeout_ms = 120000
max_filesystem_roots_per_action = 4
default_network_access = "disabled"
allowlisted_environment_variables = ["BLUE_LAGOON_DATABASE_URL"]
max_environment_variables_per_action = 8
max_captured_output_bytes = 65536
max_web_fetch_timeout_ms = 15000
max_web_fetch_response_bytes = 524288

[worker]
timeout_ms = 10000
# The harness now requires either:
# - a packaged sibling `workers` binary next to the runtime binary, or
# - an explicit worker command supplied here or through BLUE_LAGOON_WORKER_COMMAND.
# BLUE_LAGOON_WORKER_ARGS, when used, must be a JSON array of strings.
# worker.timeout_ms remains the generic worker timeout. Live Telegram foreground
# derives its conscious worker timeout from harness.default_wall_clock_budget_ms
# plus a fixed grace window so the foreground path cannot be shorter than the
# configured foreground budget.
command = ""
args = []

[telegram]
api_base_url = "https://api.telegram.org"
bot_token_env = "BLUE_LAGOON_TELEGRAM_BOT_TOKEN"
# Local operator bindings belong in config/local.toml under
# [telegram.foreground_binding].
poll_limit = 10

[model_gateway.foreground]
provider = "z_ai"
model = "z-ai-foreground"
api_key_env = "BLUE_LAGOON_FOREGROUND_API_KEY"
timeout_ms = 60000

[model_gateway.z_ai]
api_surface = "coding"

[self_model]
seed_path = "config/self_model_seed.toml"
